name: Publish release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  source-build:
    name: Source build
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    env:
      QAP_COMPILER_EXPECTED_CIRCOM_VERSION: '2.2.2'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Check synchronized versions
        run: npm run version:check

      - name: Install Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: Install Circom compiler
        run: cargo install --git https://github.com/iden3/circom --tag v2.2.2 circom

      - name: Verify Circom compiler
        run: |
          circom --version
          test "$(circom --version)" = "circom compiler 2.2.2"

      - name: Build subcircuit library
        working-directory: packages/frontend/qap-compiler
        run: |
          npx qap-compiler --reload-constants
          npx qap-compiler --build
          npx qap-compiler --dist

      - name: Build synthesizer packages
        run: npm run build --workspace @tokamak-zk-evm/synthesizer-node

      - name: Build synthesizer web package
        run: npm run build --workspace @tokamak-zk-evm/synthesizer-web

      - name: Build CLI package
        run: npm run build --workspace @tokamak-zk-evm/cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check backend workspace
        working-directory: packages/backend
        run: cargo check --workspace

  publish-subcircuit-library:
    name: Publish subcircuit-library to npm
    runs-on: ubuntu-22.04
    needs: source-build
    env:
      QAP_COMPILER_EXPECTED_CIRCOM_VERSION: '2.2.2'
    defaults:
      run:
        working-directory: packages/frontend/qap-compiler

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/frontend/qap-compiler/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Circom compiler
        run: cargo install --git https://github.com/iden3/circom --tag v2.2.2 circom

      - name: Verify Circom compiler
        run: |
          circom --version
          test "$(circom --version)" = "circom compiler 2.2.2"

      - name: Install dependencies
        run: npm ci

      - name: Reload constants
        run: npx qap-compiler --reload-constants

      - name: Build library
        run: npx qap-compiler --build

      - name: Prepare dist package
        run: npx qap-compiler --dist

      - name: Compare package version with npm
        id: version-check
        shell: bash
        run: |
          node <<'EOF_NODE' >> "$GITHUB_OUTPUT"
          const { execSync } = require('node:child_process');
          const pkg = require('./dist/package.json');

          function compareSemver(left, right) {
            const leftParts = left.split('.').map((value) => Number(value));
            const rightParts = right.split('.').map((value) => Number(value));
            const maxLength = Math.max(leftParts.length, rightParts.length);

            for (let i = 0; i < maxLength; i += 1) {
              const leftValue = leftParts[i] ?? 0;
              const rightValue = rightParts[i] ?? 0;
              if (leftValue > rightValue) return 1;
              if (leftValue < rightValue) return -1;
            }

            return 0;
          }

          let publishedVersion = null;
          try {
            publishedVersion = execSync(`npm view "${pkg.name}" version`, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'pipe'] }).trim();
          } catch (error) {
            publishedVersion = null;
          }

          const shouldPublish = publishedVersion === null || compareSemver(pkg.version, publishedVersion) > 0;

          console.log(`package_name=${pkg.name}`);
          console.log(`local_version=${pkg.version}`);
          console.log(`published_version=${publishedVersion ?? 'none'}`);
          console.log(`should_publish=${shouldPublish}`);
          EOF_NODE

      - name: Show version decision
        run: |
          echo "Package: ${{ steps.version-check.outputs.package_name }}"
          echo "Local version: ${{ steps.version-check.outputs.local_version }}"
          echo "Published version: ${{ steps.version-check.outputs.published_version }}"
          echo "Should publish: ${{ steps.version-check.outputs.should_publish }}"

      - name: Validate npm package contents
        if: steps.version-check.outputs.should_publish == 'true'
        run: npm publish --dry-run ./dist

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        run: npm publish ./dist

  publish-synthesizer:
    name: Publish synthesizer packages to npm
    runs-on: ubuntu-22.04
    needs: publish-subcircuit-library
    defaults:
      run:
        working-directory: packages/frontend/synthesizer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        working-directory: .
        run: npm ci

      - name: Compare package versions with npm
        id: version-check
        shell: bash
        run: |
          node <<'EOF_NODE' >> "$GITHUB_OUTPUT"
          const { execSync } = require('node:child_process');
          const path = require('node:path');

          const packageEntries = [
            {
              outputPrefix: 'node',
              manifestPath: path.join(process.cwd(), 'node-cli', 'package.json'),
            },
            {
              outputPrefix: 'web',
              manifestPath: path.join(process.cwd(), 'web-app', 'package.json'),
            },
          ];

          function compareSemver(left, right) {
            const leftParts = left.split('.').map((value) => Number(value));
            const rightParts = right.split('.').map((value) => Number(value));
            const maxLength = Math.max(leftParts.length, rightParts.length);

            for (let i = 0; i < maxLength; i += 1) {
              const leftValue = leftParts[i] ?? 0;
              const rightValue = rightParts[i] ?? 0;
              if (leftValue > rightValue) return 1;
              if (leftValue < rightValue) return -1;
            }

            return 0;
          }

          const manifests = packageEntries.map((entry) => {
            const manifest = require(entry.manifestPath);
            return {
              ...entry,
              name: manifest.name,
              version: manifest.version,
            };
          });

          const localVersion = manifests[0].version;
          for (const manifest of manifests) {
            if (manifest.version !== localVersion) {
              throw new Error(
                `Synchronized release policy violation: ${manifests
                  .map((value) => `${value.name}=${value.version}`)
                  .join(', ')}`,
              );
            }
          }

          let publishCount = 0;
          for (const manifest of manifests) {
            let publishedVersion = null;
            try {
              publishedVersion = execSync(`npm view "${manifest.name}" version`, {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'pipe'],
              }).trim();
            } catch (error) {
              publishedVersion = null;
            }

            const comparison =
              publishedVersion === null ? 1 : compareSemver(manifest.version, publishedVersion);
            if (comparison < 0) {
              throw new Error(
                `Local version ${manifest.version} is behind npm version ${publishedVersion} for ${manifest.name}.`,
              );
            }

            const shouldPublish = publishedVersion === null || comparison > 0;
            if (shouldPublish) {
              publishCount += 1;
            }

            console.log(`${manifest.outputPrefix}_package_name=${manifest.name}`);
            console.log(`${manifest.outputPrefix}_local_version=${manifest.version}`);
            console.log(
              `${manifest.outputPrefix}_published_version=${publishedVersion ?? 'none'}`,
            );
            console.log(`${manifest.outputPrefix}_should_publish=${shouldPublish}`);
          }

          console.log(`release_version=${localVersion}`);
          console.log(`publish_count=${publishCount}`);
          console.log(`should_publish_any=${publishCount > 0}`);
          EOF_NODE

      - name: Show version decision
        run: |
          echo "Release version: ${{ steps.version-check.outputs.release_version }}"
          echo "Node package: ${{ steps.version-check.outputs.node_package_name }}"
          echo "Node local version: ${{ steps.version-check.outputs.node_local_version }}"
          echo "Node published version: ${{ steps.version-check.outputs.node_published_version }}"
          echo "Node should publish: ${{ steps.version-check.outputs.node_should_publish }}"
          echo "Web package: ${{ steps.version-check.outputs.web_package_name }}"
          echo "Web local version: ${{ steps.version-check.outputs.web_local_version }}"
          echo "Web published version: ${{ steps.version-check.outputs.web_published_version }}"
          echo "Web should publish: ${{ steps.version-check.outputs.web_should_publish }}"

      - name: Build workspace
        if: steps.version-check.outputs.should_publish_any == 'true'
        run: npm run build

      - name: Validate node package contents
        if: steps.version-check.outputs.node_should_publish == 'true'
        working-directory: packages/frontend/synthesizer/node-cli
        run: npm publish --dry-run

      - name: Publish node package to npm
        if: steps.version-check.outputs.node_should_publish == 'true'
        working-directory: packages/frontend/synthesizer/node-cli
        run: npm publish

      - name: Validate web package contents
        if: steps.version-check.outputs.web_should_publish == 'true'
        working-directory: packages/frontend/synthesizer/web-app
        run: npm publish --dry-run

      - name: Publish web package to npm
        if: steps.version-check.outputs.web_should_publish == 'true'
        working-directory: packages/frontend/synthesizer/web-app
        run: npm publish

  check-main-crs:
    name: Check published CRS for current backend version
    runs-on: ubuntu-22.04
    needs: publish-subcircuit-library

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google API client
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client google-auth

      - name: Write Google service account key
        env:
          TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing repository secret TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi
          printf '%s' "${TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON}" > "$RUNNER_TEMP/tokamak-mpc-drive-service-account.json"

      - name: Check published CRS archive for current backend version
        env:
          TOKAMAK_MPC_DRIVE_FOLDER_ID: ${{ secrets.TOKAMAK_MPC_DRIVE_FOLDER_ID }}
          TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/tokamak-mpc-drive-service-account.json
        run: |
          if [ -z "${TOKAMAK_MPC_DRIVE_FOLDER_ID}" ]; then
            echo "Missing repository secret TOKAMAK_MPC_DRIVE_FOLDER_ID"
            exit 1
          fi

          python <<'PY'
          import hashlib
          import json
          import os
          import re
          import tempfile
          from pathlib import Path
          from zipfile import ZipFile

          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload

          repo_root = Path.cwd()
          cli_package_json = json.loads((repo_root / "packages" / "cli" / "package.json").read_text())
          cli_version = cli_package_json["version"]
          compatible_version = cli_package_json.get("tokamakZkEvm", {}).get("compatibleBackendVersion")
          if not re.fullmatch(r"\d+\.\d+", str(compatible_version)):
              raise SystemExit(
                  "packages/cli/package.json tokamakZkEvm.compatibleBackendVersion "
                  f"must be canonical MAJOR.MINOR, got {compatible_version!r}"
              )
          cli_major_minor = ".".join(cli_version.split(".")[:2])
          if compatible_version != cli_major_minor:
              raise SystemExit(
                  "CLI compatible backend version must match CLI package major.minor: "
                  f"compatible={compatible_version} cli={cli_version}"
              )

          cargo_toml = repo_root / "packages" / "backend" / "Cargo.toml"
          cargo_text = cargo_toml.read_text()
          backend_version_match = re.search(
              r"\[workspace\.package\][\s\S]*?\nversion\s*=\s*\"([^\"]+)\"",
              cargo_text,
          )
          if not backend_version_match:
              raise SystemExit("Cannot read backend workspace version from packages/backend/Cargo.toml")
          backend_version = backend_version_match.group(1)
          backend_major_minor = ".".join(backend_version.split(".")[:2])
          if backend_major_minor != compatible_version:
              raise SystemExit(
                  "Backend workspace major.minor must match CLI compatible backend version: "
                  f"backend={backend_version} compatible={compatible_version}"
              )

          archive_pattern = re.compile(
              rf"^tokamak-backend-crs-v{re.escape(compatible_version)}-(\d{{8}}T\d{{6}}Z)\.zip$"
          )
          archive_prefix = f"tokamak-backend-crs-v{compatible_version}-"
          folder_id = os.environ["TOKAMAK_MPC_DRIVE_FOLDER_ID"].strip()
          service_account_path = os.environ["TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON_PATH"].strip()

          credentials = service_account.Credentials.from_service_account_file(
              service_account_path,
              scopes=["https://www.googleapis.com/auth/drive.readonly"],
          )
          service = build("drive", "v3", credentials=credentials, cache_discovery=False)

          folder = service.files().get(
              fileId=folder_id,
              fields="id,name,mimeType,driveId",
              supportsAllDrives=True,
          ).execute()

          query = (
              f"'{folder_id}' in parents and "
              "trashed = false and "
              "mimeType != 'application/vnd.google-apps.folder'"
          )

          files = []
          visible_files = []
          page_token = None
          while True:
              response = service.files().list(
                  q=query,
                  pageSize=100,
                  pageToken=page_token,
                  fields="nextPageToken,files(id,name,webViewLink)",
                  supportsAllDrives=True,
                  includeItemsFromAllDrives=True,
              ).execute()

              visible_files.extend(response.get("files", []))
              for file in response.get("files", []):
                  name = file.get("name", "")
                  match = archive_pattern.fullmatch(name)
                  if match:
                      files.append({**file, "timestamp": match.group(1)})

              page_token = response.get("nextPageToken")
              if not page_token:
                  break

          if not files:
              visible_sample = visible_files[:20]
              print(
                  json.dumps(
                      {
                          "archivePrefix": archive_prefix,
                          "checkedFolder": folder,
                          "matchedCount": 0,
                          "visibleFileCountBeforeStop": len(visible_files),
                          "visibleFileSample": visible_sample,
                      },
                      indent=2,
                  )
              )
              raise SystemExit(
                  "No published CRS archive found in Google Drive for "
                  f"backend compatibility version {compatible_version}. Expected an archive whose "
                  f"name starts with '{archive_prefix}'."
              )

          files.sort(key=lambda file: (file["timestamp"], file["name"], file["id"]), reverse=True)
          selected = files[0]
          archive_path = Path(tempfile.mkdtemp(prefix="tokamak-crs-check-")) / selected["name"]
          request = service.files().get_media(fileId=selected["id"], supportsAllDrives=True)
          with archive_path.open("wb") as output:
              downloader = MediaIoBaseDownload(output, request, chunksize=64 * 1024 * 1024)
              done = False
              while not done:
                  _, done = downloader.next_chunk()

          def read_json_entry(zip_file, entry_name):
              try:
                  with zip_file.open(entry_name) as entry:
                      return json.loads(entry.read().decode("utf-8"))
              except KeyError:
                  raise SystemExit(f"CRS archive {selected['name']} is missing {entry_name}")

          def sha256_entry(zip_file, entry_name):
              hasher = hashlib.sha256()
              try:
                  with zip_file.open(entry_name) as entry:
                      for chunk in iter(lambda: entry.read(1024 * 1024), b""):
                          hasher.update(chunk)
              except KeyError:
                  raise SystemExit(f"CRS archive {selected['name']} is missing {entry_name}")
              return hasher.hexdigest()

          with ZipFile(archive_path) as archive:
              provenance = read_json_entry(archive, "crs_provenance.json")
              metadata = read_json_entry(archive, "build-metadata-mpc-setup.json")

              if provenance.get("backend_version") != compatible_version:
                  raise SystemExit(
                      f"CRS provenance backend_version {provenance.get('backend_version')!r} "
                      f"does not match compatible backend version {compatible_version!r}"
                  )
              if metadata.get("compatibleBackendVersion") != compatible_version:
                  raise SystemExit(
                      f"CRS metadata compatibleBackendVersion {metadata.get('compatibleBackendVersion')!r} "
                      f"does not match compatible backend version {compatible_version!r}"
                  )
              metadata_version = metadata.get("packageVersion")
              if not isinstance(metadata_version, str) or ".".join(metadata_version.split(".")[:2]) != compatible_version:
                  raise SystemExit(
                      f"CRS metadata packageVersion {metadata_version!r} is not compatible with {compatible_version}"
                  )
              source_digest = (
                  metadata.get("dependencies", {})
                  .get("subcircuitLibrary", {})
                  .get("sourceDigest")
              )
              if not isinstance(source_digest, str) or len(source_digest) == 0:
                  raise SystemExit("CRS metadata is missing dependencies.subcircuitLibrary.sourceDigest")

              hash_checks = {
                  "combined_sigma.rkyv": "combined_sigma_sha256",
                  "sigma_preprocess.rkyv": "sigma_preprocess_sha256",
                  "sigma_verify.json": "sigma_verify_sha256",
              }
              for entry_name, field_name in hash_checks.items():
                  expected = provenance.get(field_name)
                  actual = sha256_entry(archive, entry_name)
                  if expected != actual:
                      raise SystemExit(
                          f"CRS archive {selected['name']} {entry_name} sha256 mismatch: "
                          f"expected={expected} actual={actual}"
                      )

          print(
              json.dumps(
                  {
                      "backendVersion": backend_version,
                      "compatibleBackendVersion": compatible_version,
                      "selectedArchive": selected,
                      "archivePrefix": archive_prefix,
                      "matchedCount": len(files),
                  },
                  indent=2,
              )
          )
          PY

  publish-cli:
    name: Publish @tokamak-zk-evm/cli to npm
    runs-on: ubuntu-22.04
    needs:
      - publish-synthesizer
      - check-main-crs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Compare package version with npm
        id: version-check
        shell: bash
        run: |
          node <<'EOF_NODE' >> "$GITHUB_OUTPUT"
          const { execSync } = require('node:child_process');
          const pkg = require('./packages/cli/package.json');

          function compareSemver(left, right) {
            const leftParts = left.split('.').map((value) => Number(value));
            const rightParts = right.split('.').map((value) => Number(value));
            const maxLength = Math.max(leftParts.length, rightParts.length);

            for (let index = 0; index < maxLength; index += 1) {
              const leftValue = leftParts[index] ?? 0;
              const rightValue = rightParts[index] ?? 0;
              if (leftValue > rightValue) return 1;
              if (leftValue < rightValue) return -1;
            }

            return 0;
          }

          let publishedVersion = null;
          try {
            publishedVersion = execSync(`npm view "${pkg.name}" version`, {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            }).trim();
          } catch (error) {
            publishedVersion = null;
          }

          const comparison =
            publishedVersion === null ? 1 : compareSemver(pkg.version, publishedVersion);
          if (comparison < 0) {
            throw new Error(
              `Local version ${pkg.version} is behind npm version ${publishedVersion} for ${pkg.name}.`,
            );
          }

          const shouldPublish = publishedVersion === null || comparison > 0;
          console.log(`package_name=${pkg.name}`);
          console.log(`local_version=${pkg.version}`);
          console.log(`published_version=${publishedVersion ?? 'none'}`);
          console.log(`should_publish=${shouldPublish}`);
          EOF_NODE

      - name: Show version decision
        run: |
          echo "Package: ${{ steps.version-check.outputs.package_name }}"
          echo "Local version: ${{ steps.version-check.outputs.local_version }}"
          echo "Published version: ${{ steps.version-check.outputs.published_version }}"
          echo "Should publish: ${{ steps.version-check.outputs.should_publish }}"

      - name: Validate CLI release readiness
        if: steps.version-check.outputs.should_publish == 'true'
        run: npm run --workspace @tokamak-zk-evm/cli release:check

      - name: Show current CLI release notes
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          echo "## @tokamak-zk-evm/cli ${{ steps.version-check.outputs.local_version }}" >> "$GITHUB_STEP_SUMMARY"
          node packages/cli/scripts/release-readiness.cjs --print-current-notes >> "$GITHUB_STEP_SUMMARY"

      - name: Build CLI package
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          npm run --workspace @tokamak-zk-evm/synthesizer-node build
          npm run --workspace @tokamak-zk-evm/cli build

      - name: Validate npm package contents
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/cli
        run: npm publish --dry-run --ignore-scripts

      - name: Publish to npm
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: packages/cli
        run: npm publish --ignore-scripts

  evm-compat-test:
    name: EVM compatibility tests
    runs-on: ubuntu-22.04
    needs: publish-cli
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/frontend/synthesizer/package-lock.json

      - name: Install latest published Tokamak zk-EVM packages
        run: |
          cd packages/frontend/synthesizer
          npm install \
            --workspace @tokamak-zk-evm/synthesizer-node \
            --workspace @tokamak-zk-evm/synthesizer-web \
            @tokamak-zk-evm/subcircuit-library@latest
          npm ls @tokamak-zk-evm/subcircuit-library --workspaces

      - name: Run synthesizer-node tests
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          cd packages/frontend/synthesizer
          npm run --workspace @tokamak-zk-evm/synthesizer-node test

      - name: Upload EVM compatibility outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-compat-test-outputs-${{ github.run_number }}
          path: packages/frontend/synthesizer/outputs/
          retention-days: 7

  post-publish-test-build:
    name: Post-publish Test & Build
    runs-on: ubuntu-22.04
    needs: evm-compat-test
    timeout-minutes: 90
    env:
      TOKAMAK_ZKEVM_CLI_CACHE_DIR: ${{ github.workspace }}/.tokamak-cli-cache

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Read release version
        id: release-version
        run: |
          version="$(node -p "require('./packages/cli/package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake dos2unix pkg-config tar unzip zip

      - name: Install Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-post-publish-cargo-${{ steps.release-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-post-publish-cargo-

      - name: Restore CRS download cache
        uses: actions/cache/restore@v4
        with:
          path: .tokamak-cli-cache/linux/downloads/crs/
          key: ${{ runner.os }}-post-publish-cli-crs-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-post-publish-cli-crs-

      - name: Restore ICICLE download cache
        id: icicle-download-cache
        uses: actions/cache/restore@v4
        with:
          path: .tokamak-cli-cache/linux/downloads/icicle/
          key: ${{ runner.os }}-post-publish-cli-icicle-${{ steps.release-version.outputs.version }}

      - name: Install published CLI package
        run: npm install -g "@tokamak-zk-evm/cli@${{ steps.release-version.outputs.version }}"

      - name: Install published runtime and CRS
        env:
          TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.TOKAMAK_MPC_DRIVE_SERVICE_ACCOUNT_JSON }}
        run: tokamak-cli --install

      - name: Save CRS download cache
        uses: actions/cache/save@v4
        with:
          path: .tokamak-cli-cache/linux/downloads/crs/
          key: ${{ runner.os }}-post-publish-cli-crs-${{ github.run_id }}

      - name: Save ICICLE download cache
        if: steps.icicle-download-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .tokamak-cli-cache/linux/downloads/icicle/
          key: ${{ runner.os }}-post-publish-cli-icicle-${{ steps.release-version.outputs.version }}

      - name: Validate installed setup outputs
        run: |
          runtime_dir="$TOKAMAK_ZKEVM_CLI_CACHE_DIR/linux/runtime"
          required=(
            "$runtime_dir/resource/setup/output/combined_sigma.rkyv"
            "$runtime_dir/resource/setup/output/sigma_preprocess.rkyv"
            "$runtime_dir/resource/setup/output/sigma_verify.json"
          )
          for file in "${required[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing setup artifact in published runtime: $file"
              exit 1
            fi
          done
          echo "Published runtime setup artifacts are ready"

      - name: Run L2StateChannel synthesize
        run: |
          tokamak-cli --synthesize \
            "${{ github.workspace }}/packages/frontend/synthesizer/examples/L2StateChannel"

      - name: Run preprocess
        run: tokamak-cli --preprocess

      - name: Run prove
        run: tokamak-cli --prove

      - name: Run verify
        run: tokamak-cli --verify
