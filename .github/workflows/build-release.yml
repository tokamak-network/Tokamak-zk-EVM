name: Pre-publish Test & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pre-publish-test-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source-build:
    name: Source build
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update TokamakL2JS to latest main
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule update --remote submodules/TokamakL2JS
          echo "TokamakL2JS HEAD: $(git -C submodules/TokamakL2JS rev-parse --short HEAD)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Check synchronized versions
        run: npm run version:check

      - name: Build subcircuit library
        working-directory: packages/frontend/qap-compiler
        run: |
          npx qap-compiler --reload-constants
          npx qap-compiler --build
          npx qap-compiler --dist

      - name: Build synthesizer packages
        run: npm run build --workspace @tokamak-zk-evm/synthesizer-node

      - name: Build synthesizer web package
        run: npm run build --workspace @tokamak-zk-evm/synthesizer-web

      - name: Build CLI package
        run: npm run build --workspace @tokamak-zk-evm/cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config

      - name: Install Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check backend workspace
        working-directory: packages/backend
        run: cargo check --workspace

  evm-compat-test:
    name: EVM compatibility tests
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update TokamakL2JS to latest main
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          git submodule update --remote submodules/TokamakL2JS
          echo "TokamakL2JS HEAD: $(git -C submodules/TokamakL2JS rev-parse --short HEAD)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install synthesizer workspace dependencies
        run: |
          cd packages/frontend/synthesizer
          npm ci

      - name: Run synthesizer-node tests
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          cd packages/frontend/synthesizer
          npm run --workspace @tokamak-zk-evm/synthesizer-node test

      - name: Upload EVM compatibility outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evm-compat-test-outputs-${{ github.run_number }}
          path: packages/frontend/synthesizer/outputs/
          retention-days: 7
